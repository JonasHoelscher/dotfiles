set -g escape-time 10
set -g mouse on

# Set true color support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:Tc"
set-option -a terminal-features 'xterm-256color:RGB'

# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'
tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R

# Set to vi mode
setw -g mode-keys vi

# Sync tmux buffer and system clipboard
bind -T copy-mode-vi y send -X copy-pip-and-cancel "xclip -selection clipboard -in"

# Remap prefix from 'C-b' to 'C-a'
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# Dont rename windows automatically
set-option -g allow-rename off

# DESIGN TWEAKS

# Don't do anything when a 'bell' rings
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none

# Reload config file (change file location to your the tmux.conf you want to use)
bind r source-file ~/.tmux.conf

# --- Habamax style ---

# Status bar (Hintergrund fast schwarz, Text in neutralem Grau)
set -g status-style "bg=#1c1c1c,fg=#bcbcbc"

# Messages & modes (Gold/Ocker Akzent für Befehle/Suche)
set -g message-style "bg=#303030,fg=#ffaf00"
setw -g mode-style "bg=#444444,fg=#ffaf00"

# Panes (Dunkles Grau für inaktive, dezentes Blau für aktive)
set -g pane-border-style "fg=#444444"
set -g pane-active-border-style "fg=#5f87af"

# Windows
setw -g window-status-style "fg=#8a8a8a,bg=#1c1c1c"
setw -g window-status-activity-style "fg=#ffaf00,bg=#1c1c1c"

# Aktives Fenster (Helleres Grau mit Gold-Akzent)
setw -g window-status-current-style "fg=#ffffff,bg=#3a3a3a"
setw -g window-status-current-format " #I  #W #[fg=#ffaf00]#{?window_flags,#{window_flags},}"

setw -g window-status-format " #I  #W #[fg=#5f87af]#{?window_flags,#{window_flags},}"

# Status left / right
set -g status-left-length 40
set -g status-left "#[fg=#ffaf00] #[fg=#5f87af]#S #[fg=#444444] #[fg=#bcbcbc]#h "

set -g status-right-length 50
set -g status-right "#[fg=#8a8a8a]%a %d %b  #[fg=#ffaf00]%H:%M "
